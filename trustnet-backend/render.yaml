services:
  - type: web
    name: trustnet-api
    runtime: docker
    plan: standard
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustnet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trustnet-redis
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SARVAM_API_KEY
        sync: false
      - key: WHOIS_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_KEY
        sync: false
      - key: NUMVERIFY_API_KEY
        sync: false
      - key: BASE_SEPOLIA_RPC
        sync: false
      - key: BACKEND_WALLET_PRIVATE_KEY
        sync: false
      - key: TRUSTNET_CONTRACT_ADDRESS
        sync: false
      - key: BLOCKCHAIN_ENABLED
        value: "false"
      - key: ENV
        value: production
      - key: FRONTEND_URL
        value: https://trustnet.onrender.com
    healthCheckPath: /health

  - type: worker
    name: trustnet-worker
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustnet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trustnet-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: trustnet-api
          envVarKey: SECRET_KEY

  - type: cron
    name: trustnet-daily-refresh
    schedule: "0 2 * * *"
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python workflows/daily_refresh.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustnet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trustnet-redis
          property: connectionString

  - type: cron
    name: trustnet-community-recalc
    schedule: "*/30 * * * *"
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python workflows/community_recalc.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustnet-db
          property: connectionString

databases:
  - name: trustnet-db
    plan: starter
    ipAllowList: []

redis:
  - name: trustnet-redis
    plan: free
    ipAllowList: []