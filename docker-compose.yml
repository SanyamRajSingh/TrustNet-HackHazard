services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./trustnet-backend/.env
    environment:
      # Override DB to ensure SQLite is used inside container
      - DATABASE_URL=sqlite+aiosqlite:///./trustnet.db
      - BLOCKCHAIN_ENABLED=false
      # Optional API keys — explicitly empty means "skip that check"
      - WHOIS_API_KEY=${WHOIS_API_KEY:-}
      - GOOGLE_SAFE_BROWSING_KEY=${GOOGLE_SAFE_BROWSING_KEY:-}
      - NUMVERIFY_API_KEY=${NUMVERIFY_API_KEY:-}
    # No volume mount — use the built image directly (production-like)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
