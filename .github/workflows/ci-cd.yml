name: TrustNet CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trustnet
          POSTGRES_PASSWORD: password
          POSTGRES_DB: trustnet_test
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short
        env:
          DATABASE_URL: postgresql://trustnet:password@localhost:5432/trustnet_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          SARVAM_API_KEY: test-key
      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql://trustnet:password@localhost:5432/trustnet_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          SARVAM_API_KEY: test-key
          WHOIS_API_KEY: test-key
          GOOGLE_SAFE_BROWSING_KEY: test-key
          NUMVERIFY_API_KEY: test-key

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit
      - name: Lint
        run: |
          cd frontend
          npx eslint src/
      - name: Build
        run: |
          cd frontend
          npm run build

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json
      - name: Install dependencies
        run: |
          cd contracts
          npm ci
      - name: Compile contracts
        run: |
          cd contracts
          npx hardhat compile
      - name: Run tests
        run: |
          cd contracts
          npx hardhat test

  deploy:
    needs: [backend-tests, frontend-tests, contract-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}